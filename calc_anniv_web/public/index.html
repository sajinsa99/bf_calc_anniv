<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Informations d'anniversaire</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <header>
    <h1>🎂 Informations d'anniversaire</h1>
  </header>

  <main>
    <section class="form-section">
      <div class="form-group">
        <label for="input-date">Date de naissance</label>
        <input type="date" id="input-date" autocomplete="off">
      </div>

      <fieldset class="mode-fieldset">
        <legend>Options</legend>
        <label class="radio-label">
          <input type="checkbox" id="chk-deces" /> Décès
        </label>
        <label class="radio-label">
          <input type="checkbox" id="chk-futur" /> Date future
        </label>
      </fieldset>

      <!-- Champs conditionnels décès -->
      <div id="deces-fields" class="conditional-fields hidden">
        <div class="toggle-row">
          <label class="toggle-label">
            <input type="checkbox" id="deces-annee-only" />
            Année seule
          </label>
        </div>
        <div class="form-group" id="deces-date-group">
          <label for="input-deces">Date de décès</label>
          <input type="date" id="input-deces" autocomplete="off">
        </div>
        <div class="form-group hidden" id="deces-year-group">
          <label for="input-deces-annee">Année de décès <span class="fmt-hint">(AAAA)</span></label>
          <input type="text" id="input-deces-annee" placeholder="ex : 2024" maxlength="4" autocomplete="off" />
        </div>
      </div>

      <!-- Champs conditionnels futur -->
      <div id="futur-fields" class="conditional-fields hidden">
        <div class="toggle-row">
          <label class="toggle-label">
            <input type="checkbox" id="futur-annee-only" />
            Année seule
          </label>
        </div>
        <div class="form-group" id="futur-date-group">
          <label for="input-futur">Date de référence</label>
          <input type="date" id="input-futur" autocomplete="off">
        </div>
        <div class="form-group hidden" id="futur-year-group">
          <label for="input-futur-annee">Année de référence <span class="fmt-hint">(AAAA)</span></label>
          <input type="text" id="input-futur-annee" placeholder="ex : 2030" maxlength="4" autocomplete="off" />
        </div>
      </div>

      <button id="btn-calc" type="button">Calculer</button>
    </section>

    <div id="status" class="status hidden"></div>

    <section id="result" class="hidden"></section>
  </main>
</div>
<script src="app.js" type="module"></script>
</body>
</html>
